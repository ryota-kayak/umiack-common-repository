name: Build and Deploy to Sakura Internet

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      - name: ⚙️ Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm install

      - name: 🧹 Build and Optimize
        run: ./scripts/build.sh

      - name: 🚀 Deploy to Sakura Internet (SFTP)
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SFTP_HOST }}
          username: ${{ secrets.SFTP_USERNAME }}
          password: ${{ secrets.SFTP_PASSWORD }}
          port: 22
          source: "dist/server/*"
          target: "/home/umiack/www/"
          strip_components: 2

      - name: 🧼 Surgical Sync (Cleanup tours folder only)
        uses: CONTRAST-Security-OSS/rsync-deploy@v3
        with:
          # Only sync the tours directory to ensure other server folders are untouched
          source: "dist/server/common/umiack-site-assets/img/tours/"
          target: "/home/umiack/www/common/umiack-site-assets/img/tours/"
          flags: "-avz --delete"
          host: ${{ secrets.SFTP_HOST }}
          user: ${{ secrets.SFTP_USERNAME }}
          password: ${{ secrets.SFTP_PASSWORD }}
