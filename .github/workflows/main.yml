name: Build and Deploy to Sakura Internet

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      - name: ⚙️ Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm install

      - name: 🧹 Build and Optimize
        run: ./scripts/build.sh

      - name: 🚀 Deploy to Sakura Internet (SFTP)
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SFTP_HOST }}
          username: ${{ secrets.SFTP_USERNAME }}
          password: ${{ secrets.SFTP_PASSWORD }}
          port: 22
          source: "dist/server/*"
          target: "/home/umiack/www/"
          strip_components: 2

      - name: 🧼 Surgical Sync (Cleanup tours folder only)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.SFTP_HOST }}
          username: ${{ secrets.SFTP_USERNAME }}
          password: ${{ secrets.SFTP_PASSWORD }}
          protocol: sftp
          port: 22
          # Scope to the tours folder for safety
          local-dir: dist/server/common/umiack-site-assets/img/tours/
          server-dir: /home/umiack/www/common/umiack-site-assets/img/tours/
          # MIRROR: Delete files/folders from server that are not in local-dir
          delete-orphans: true
