name: Build and Deploy to Sakura Internet

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      - name: ⚙️ Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm install

      - name: 🧹 Build and Optimize
        run: ./scripts/build.sh

      - name: 🚀 Deploy to Sakura Internet (SFTP)
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SFTP_HOST }}
          username: ${{ secrets.SFTP_USERNAME }}
          password: ${{ secrets.SFTP_PASSWORD }}
          port: 22
          source: "dist/server/*"
          target: "/home/umiack/www/"
          strip_components: 2

      - name: 🧼 Surgical Sync (Industrial Strength Rsync)
        env:
          SSHPASS: ${{ secrets.SFTP_PASSWORD }}
        run: |
          # Install sshpass to handle password authentication with rsync
          sudo apt-get install -y sshpass
          
          # Perform the surgical sync of the tours folder only.
          # --delete ensures that old folders like 'skytree' are removed from the server.
          sshpass -e rsync -avz --delete \
            -e "ssh -o StrictHostKeyChecking=no" \
            dist/server/common/umiack-site-assets/img/tours/ \
            ${{ secrets.SFTP_USERNAME }}@${{ secrets.SFTP_HOST }}:/home/umiack/www/common/umiack-site-assets/img/tours/
