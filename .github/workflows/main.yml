name: Build and Deploy to Sakura Internet

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      - name: ⚙️ Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm install

      - name: 🧹 Build and Optimize
        run: ./scripts/build.sh

      - name: 🚀 Unified Mirror Sync (Perfect Server State)
        env:
          SSHPASS: ${{ secrets.SFTP_PASSWORD }}
        run: |
          # Install sshpass to handle password authentication
          sudo apt-get install -y sshpass
          
          # Perform the full mirror sync of the server assets.
          # The --delete flag ensures stray files (like deleted CSS) are removed from the server.
          # -a  : Archive mode (preserves permissions, timestamps, etc.)
          # -v  : Verbose
          # -z  : Compress data during transfer
          # -i  : Itemize changes (shows exactly what's being updated/deleted)
          sshpass -e rsync -avzi --delete \
            -e "ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=30" \
            dist/server/ \
            ${{ secrets.SFTP_USERNAME }}@${{ secrets.SFTP_HOST }}:/home/umiack/www/
