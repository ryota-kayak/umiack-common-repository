name: Build and Deploy to Sakura Internet

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      - name: ⚙️ Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm install

      - name: 🧹 Build and Optimize
        run: ./scripts/build.sh

      - name: 🚀 Secure Key-Based Deployment
        run: |
          # 1. 設置: GitHubシークレットから秘密鍵を導入
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          # 2. 実行: 制限付きの鍵を使用して同期
          # サーバー側の「門番(restrict_common.sh)」が働き、common以外への操作は物理的に拒否されます。
          # --delete を追加し、/common/ ディレクトリ内においてのみ、不要になった古いファイルを自動削除します。
          rsync -avzi --delete \
            -e "ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa" \
            dist/server/common/ \
            ${{ secrets.SFTP_USERNAME }}@${{ secrets.SFTP_HOST }}:/home/umiack/www/common/

