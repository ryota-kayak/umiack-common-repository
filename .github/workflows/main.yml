name: Build and Deploy to Sakura Internet

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      - name: ⚙️ Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm install

      - name: 🧹 Build and Optimize
        run: ./scripts/build.sh

      - name: 🚀 Emergency Restore Deployment (Safe Sync)
        env:
          SSHPASS: ${{ secrets.SFTP_PASSWORD }}
        run: |
          sudo apt-get install -y sshpass
          
          # SAFETY: Syncing ONLY the common directory specifically
          # NO --delete on the parent directory to prevent wiping other sites.
          sshpass -e rsync -avzi \
            -e "ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null" \
            dist/server/common/ \
            ${{ secrets.SFTP_USERNAME }}@${{ secrets.SFTP_HOST }}:/home/umiack/www/common/
