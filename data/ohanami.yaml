# 紹介文
intro_paragraph: |
  東京都心でお花見カヤックしませんか？江戸時代に開鑿された運河をのんびりと漕ぎながら巡り、桜のトンネルと水上から眺める東京を楽しみます。初心者や体力に自信のない方でも、流れや波のない静水なので楽しめます。

# 見どころ（Highlights）
highlights:
  - title: "【絶景】水上の桜トンネル"
    text: "運河沿いに咲き誇る桜。..."
  - title: "【歴史】江戸の運河と大都会のタイムトラベル"
    text: "..."
  - title: "【体験】ミニ パナマ運河をカヤックで突破"
    text: "..."
  - title: "【至福】いま手で焙煎した香り高き珈琲"
    text: "..."

# よくある質問
faqs:
  - q: "初心者で体力がなくても大丈夫ですか？"
    a: "はい。流れのない運河をゆっくり進むため、体力に自信のない方でも安心してお楽しみいただけます。"
  - q: "転覆しませんか？"
    a: "流れや波のない静かな運河であるため、転覆 Risk は極めて低いです。"

