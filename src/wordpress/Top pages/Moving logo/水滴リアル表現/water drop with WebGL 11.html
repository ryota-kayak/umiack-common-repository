<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>スペクトル分割・物理色収差水滴（予約語修正済み）</title>
  <style>
    html, body {height: 100%; margin: 0;}
    body {overflow: hidden;}
    canvas {display: block;}
  </style>
</head>
<body>
<script src="https://unpkg.com/three@0.155.0/build/three.min.js"></script>
<script id="fragShader" type="x-shader/x-fragment">
precision highp float;
uniform sampler2D uTexture;
uniform vec2 uResolution;
uniform vec2 uDrop;
uniform vec2 uLight;

// 可視光スペクトルを7分割（波長ごと屈折率をセット）
float refract_indices[7];
vec3 spectrum_colors[7];

void setup() {
  // 700nm(赤)→400nm(紫)で物理屈折率をやや誇張
  refract_indices[0] = 1.325; // 赤
  refract_indices[1] = 1.332; // 橙
  refract_indices[2] = 1.340; // 黄
  refract_indices[3] = 1.347; // 緑
  refract_indices[4] = 1.355; // 水
  refract_indices[5] = 1.363; // 青
  refract_indices[6] = 1.372; // 紫
  // sRGB近似の混色重み（簡易）
  spectrum_colors[0] = vec3(1.0, 0.08, 0.02);  // 赤
  spectrum_colors[1] = vec3(1.0, 0.4, 0.05);   // 橙
  spectrum_colors[2] = vec3(1.0, 1.0, 0.2);    // 黄
  spectrum_colors[3] = vec3(0.3, 1.0, 0.3);    // 緑
  spectrum_colors[4] = vec3(0.1, 0.7, 1.0);    // 水
  spectrum_colors[5] = vec3(0.12, 0.2, 1.0);   // 青
  spectrum_colors[6] = vec3(0.6, 0.0, 1.0);    // 紫
}

void main() {
  setup();
  vec2 aspect = vec2(uResolution.x / uResolution.y, 1.0);
  vec2 uv = gl_FragCoord.xy / uResolution.xy;
  vec2 dropCenter = uDrop;
  float dropRadius = 0.20;
  float d = length((uv - dropCenter) * aspect);
  float ratio = d / dropRadius;
  vec3 col = vec3(0.0);
  float alpha = 0.0;

  if (d < dropRadius) {
    float thickness = sqrt(dropRadius * dropRadius - d * d);

    // --- スペクトル細分化屈折サンプリング ---
    const int N = 7;
    vec3 sum = vec3(0.0);
    float wsum = 0.0;
    for (int i=0; i<N; ++i) {
      float eta = refract_indices[i];
      vec3 colorWeight = spectrum_colors[i];
      vec3 V = vec3(0.0, 0.0, -1.0);
      vec3 Nrm = normalize(vec3((uv - dropCenter) * aspect, thickness));
      vec3 refr = refract(V, Nrm, 1.0 / eta);
      float chroma = 2.4;
      vec2 uv_samp = uv + chroma * refr.xy * (dropRadius - d); // ←予約語回避
      sum += texture2D(uTexture, clamp(uv_samp, 0.0, 1.0)).rgb * colorWeight;
      wsum += max(max(colorWeight.r, colorWeight.g), colorWeight.b);
    }
    col = sum / wsum;

    // ハイライトと透明度
    vec2 lightVec2D = normalize(uLight - dropCenter);
    vec3 lightDir = normalize(vec3(lightVec2D, 0.7));
    vec3 Nrm = normalize(vec3((uv - dropCenter) * aspect, thickness));
    float diffuse = 0.92 + 0.13 * max(0.0, dot(Nrm, lightDir));
    vec3 viewDir = vec3(0.0,0.0,1.0);
    vec3 halfDir = normalize(lightDir + viewDir);
    float spec = pow(max(0.0, dot(Nrm, halfDir)), 50.0);
    float specular = spec * (1.0 - ratio) * 2.2;
    col = col * diffuse + vec3(specular);
    alpha = 0.42 + 0.6 * pow(1.0 - ratio, 0.37);

    // フチを少し強調（物理屈折のみで十分色分離するのでhue演算なし）
    if (abs(d - dropRadius) < 0.017) {
      float rim = smoothstep(0.017, 0.0, abs(d - dropRadius));
      col += rim * col * 0.15;
      alpha = max(alpha, rim*0.72);
    }
  } else {
    col = texture2D(uTexture, uv).rgb;
    alpha = 1.0;
  }

  gl_FragColor = vec4(col, alpha);
}
</script>
<script>
const renderer = new THREE.WebGLRenderer({antialias:true, alpha:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
const scene = new THREE.Scene();

let mouse = { x: 0.5, y: 0.5 };
let light = { x: 0.85, y: 0.15 };

const imgUrl = 'https://images.unsplash.com/photo-1462331940025-496dfbfc7564?auto=format&fit=crop&w=1200&q=80';
const loader = new THREE.TextureLoader();
loader.setCrossOrigin('anonymous');
loader.load(imgUrl, texture => {
  const material = new THREE.ShaderMaterial({
    uniforms: {
      uTexture: { value: texture },
      uResolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
      uDrop: { value: new THREE.Vector2(mouse.x, mouse.y) },
      uLight: { value: new THREE.Vector2(light.x, light.y) }
    },
    fragmentShader: document.getElementById('fragShader').textContent,
    transparent: true
  });
  const geometry = new THREE.PlaneGeometry(2, 2);
  const mesh = new THREE.Mesh(geometry, material);
  scene.add(mesh);

  window.addEventListener('resize', () => {
    renderer.setSize(window.innerWidth, window.innerHeight);
    material.uniforms.uResolution.value.set(window.innerWidth, window.innerHeight);
  });

  let dragging = false;
  window.addEventListener('pointerdown', e => { dragging = true; });
  window.addEventListener('pointerup', e => { dragging = false; });
  window.addEventListener('pointermove', e => {
    if (dragging) {
      mouse.x = e.clientX / window.innerWidth;
      mouse.y = 1.0 - (e.clientY / window.innerHeight);
    }
  });

  // 右クリックで光源移動
  window.addEventListener('contextmenu', e => e.preventDefault());
  window.addEventListener('pointerdown', e => {
    if (e.button === 2) window.addEventListener('pointermove', moveLight);
  });
  window.addEventListener('pointerup', e => {
    if (e.button === 2) window.removeEventListener('pointermove', moveLight);
  });
  function moveLight(e) {
    light.x = e.clientX / window.innerWidth;
    light.y = 1.0 - (e.clientY / window.innerHeight);
  }

  renderer.setAnimationLoop(() => {
    material.uniforms.uDrop.value.set(mouse.x, mouse.y);
    material.uniforms.uLight.value.set(light.x, light.y);
    renderer.render(scene, camera);
  });
});
</script>
</body>
</html>
