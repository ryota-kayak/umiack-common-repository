<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>WebGL水滴：点光源ハイライト付き</title>
  <style>
    html, body {height: 100%; margin: 0;}
    body {overflow: hidden;}
    canvas {display: block;}
  </style>
</head>
<body>
<script src="https://unpkg.com/three@0.155.0/build/three.min.js"></script>
<script id="fragShader" type="x-shader/x-fragment">
uniform sampler2D uTexture;
uniform vec2 uResolution;
uniform vec2 uDrop;     // 水滴の中心（正規化 [0,1]）
uniform vec2 uLight;    // 光源の位置（正規化 [0,1]）

void main() {
  vec2 uv = gl_FragCoord.xy / uResolution.xy;
  vec2 dropCenter = uDrop;
  float r = 0.20; // 水滴半径（正規化）
  float d = distance(uv, dropCenter);
  float ratio = d / r;

  vec2 uv2 = uv;
  // 水滴レンズ効果
  if (d < r) {
    float lensStrength = 0.18;
    uv2 = dropCenter + (uv - dropCenter) * (1.0 - lensStrength * (1.0 - ratio*ratio));
  }

  vec3 col = texture2D(uTexture, uv2).rgb;

  // 照明計算
  float shading = 1.0;
  float highlight = 0.0;
  if (d < r) {
    // 水滴表面の法線（Z+方向の半球近似）
    vec2 n = normalize(uv - dropCenter);
    vec3 normal = normalize(vec3(n, sqrt(max(0.0, 1.0 - dot(n, n)))));
    // 光源方向
    vec2 lightVec2D = normalize(uLight - dropCenter);
    vec3 lightDir = normalize(vec3(lightVec2D, 0.8)); // Z方向にも少し傾ける
    // 拡散反射（Lambert）
    shading = 0.92 + 0.18 * max(0.0, dot(normal, lightDir));
    // スペキュラ（フォン反射モデル）
    vec3 viewDir = vec3(0.0,0.0,1.0);
    vec3 halfDir = normalize(lightDir + viewDir);
    float spec = pow(max(0.0, dot(normal, halfDir)), 48.0);
    highlight = spec * (1.0 - ratio) * 2.1; // 中心側ほど強い
  }

  // 明るさ調整＋スペキュラハイライト
  col = col * shading + vec3(highlight);

  // 水滴の縁のカウスティク
  if (abs(d - r) < 0.012) {
    float caustic = 0.22 * (1.0 - smoothstep(0.0, 0.012, abs(d - r)));
    col += vec3(caustic, caustic, caustic*1.1);
  }

  gl_FragColor = vec4(col, 1.0);
}
</script>
<script>
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
const scene = new THREE.Scene();

let mouse = { x: 0.5, y: 0.5 }; // 水滴の中心（正規化）
const light = { x: 0.95, y: 0.92 }; // 画面右上・太陽固定

window.addEventListener('pointermove', e => {
  mouse.x = e.clientX / window.innerWidth;
  mouse.y = 1.0 - (e.clientY / window.innerHeight);
});

// 背景画像（CORS対応のpicsum.photosを利用）
const imgUrl = 'https://picsum.photos/800/600';
const loader = new THREE.TextureLoader();
loader.setCrossOrigin('anonymous');
loader.load(imgUrl, texture => {
  const material = new THREE.ShaderMaterial({
    uniforms: {
      uTexture: { value: texture },
      uResolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
      uDrop: { value: new THREE.Vector2(mouse.x, mouse.y) },
      uLight: { value: new THREE.Vector2(light.x, light.y) }
    },
    fragmentShader: document.getElementById('fragShader').textContent
  });
  const geometry = new THREE.PlaneGeometry(2, 2);
  const mesh = new THREE.Mesh(geometry, material);
  scene.add(mesh);

  window.addEventListener('resize', () => {
    renderer.setSize(window.innerWidth, window.innerHeight);
    material.uniforms.uResolution.value.set(window.innerWidth, window.innerHeight);
  });

  renderer.setAnimationLoop(() => {
    material.uniforms.uDrop.value.set(mouse.x, mouse.y);
    // 光源は画面右上で固定（必要ならマウス操作で動かすことも可能）
    material.uniforms.uLight.value.set(light.x, light.y);
    renderer.render(scene, camera);
  });
});
</script>
</body>
</html>
