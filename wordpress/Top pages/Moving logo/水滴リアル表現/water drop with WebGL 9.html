<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>観察・光源方向依存 虹色フチ水滴エフェクト</title>
  <style>
    html, body {height: 100%; margin: 0;}
    body {overflow: hidden;}
    canvas {display: block;}
  </style>
</head>
<body>
<script src="https://unpkg.com/three@0.155.0/build/three.min.js"></script>
<script id="fragShader" type="x-shader/x-fragment">
precision highp float;
uniform sampler2D uTexture;
uniform vec2 uResolution;
uniform vec2 uDrop;
uniform vec2 uLight;

// HSV→RGB
vec3 hsv2rgb(vec3 c) {
  vec4 K = vec4(1.0, 2.0/3.0, 1.0/3.0, 3.0);
  vec3 p = abs(fract(c.xxx + K.xyz) * 6.0 - K.www);
  return c.z * mix(K.xxx, clamp(p - K.xxx, 0.0, 1.0), c.y);
}

float getRefractIndex(float w) {
  return mix(1.32, 1.38, w);
}

void main() {
  vec2 aspect = vec2(uResolution.x / uResolution.y, 1.0);
  vec2 uv = gl_FragCoord.xy / uResolution.xy;
  vec2 dropCenter = uDrop;
  float dropRadius = 0.20;
  float d = length((uv - dropCenter) * aspect);
  float ratio = d / dropRadius;
  vec3 col = vec3(0.0);

  if (d < dropRadius) {
    float thickness = sqrt(dropRadius * dropRadius - d * d);
    float eta_r = getRefractIndex(0.0);
    float eta_g = getRefractIndex(0.5);
    float eta_b = getRefractIndex(1.0);

    vec3 V = vec3(0.0, 0.0, -1.0);
    vec3 N = normalize(vec3((uv - dropCenter) * aspect, thickness));

    vec3 refrR = refract(V, N, 1.0 / eta_r);
    vec3 refrG = refract(V, N, 1.0 / eta_g);
    vec3 refrB = refract(V, N, 1.0 / eta_b);

    float chroma = 2.4;
    vec2 sampleR = uv + chroma * refrR.xy * (dropRadius - d);
    vec2 sampleG = uv + chroma * refrG.xy * (dropRadius - d);
    vec2 sampleB = uv + chroma * refrB.xy * (dropRadius - d);

    col.r = texture2D(uTexture, clamp(sampleR, 0.0, 1.0)).r;
    col.g = texture2D(uTexture, clamp(sampleG, 0.0, 1.0)).g;
    col.b = texture2D(uTexture, clamp(sampleB, 0.0, 1.0)).b;

    // ハイライト
    vec2 lightVec2D = normalize(uLight - dropCenter);
    vec3 lightDir = normalize(vec3(lightVec2D, 0.7));
    float diffuse = 0.92 + 0.13 * max(0.0, dot(N, lightDir));
    vec3 viewDir = vec3(0.0,0.0,1.0);
    vec3 halfDir = normalize(lightDir + viewDir);
    float spec = pow(max(0.0, dot(N, halfDir)), 50.0);
    float specular = spec * (1.0 - ratio) * 2.2;

    float alpha = 0.42 + 0.6 * pow(1.0 - ratio, 0.37);

    col = col * diffuse + vec3(specular);

    // --- 動的虹色フチ（観察・光源方向依存） ---
    if (abs(d - dropRadius) < 0.017) {
      float rim = smoothstep(0.017, 0.0, abs(d - dropRadius));
      // 法線と光源方向ベクトルのなす角
      float angle = acos(clamp(dot(N, lightDir), -1.0, 1.0)); // 0:光源直面, pi:真裏
      float hue = fract(angle / 3.14159); // 0～1を虹色に
      vec3 rainbow = hsv2rgb(vec3(hue, 0.65, 1.0));
      col += rim * rainbow;
      alpha = max(alpha, rim*0.72);
    }

    gl_FragColor = vec4(col, alpha);

  } else {
    col = texture2D(uTexture, uv).rgb;
    gl_FragColor = vec4(col, 1.0);
  }
}
</script>
<script>
const renderer = new THREE.WebGLRenderer({antialias:true, alpha:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
const scene = new THREE.Scene();

let mouse = { x: 0.5, y: 0.5 };
let light = { x: 0.85, y: 0.15 }; // 最初は右上

// 背景画像（NASA/ESA等の美しい宇宙画像がおすすめ）
const imgUrl = 'https://images.unsplash.com/photo-1462331940025-496dfbfc7564?auto=format&fit=crop&w=1200&q=80';
const loader = new THREE.TextureLoader();
loader.setCrossOrigin('anonymous');
loader.load(imgUrl, texture => {
  const material = new THREE.ShaderMaterial({
    uniforms: {
      uTexture: { value: texture },
      uResolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
      uDrop: { value: new THREE.Vector2(mouse.x, mouse.y) },
      uLight: { value: new THREE.Vector2(light.x, light.y) }
    },
    fragmentShader: document.getElementById('fragShader').textContent,
    transparent: true
  });
  const geometry = new THREE.PlaneGeometry(2, 2);
  const mesh = new THREE.Mesh(geometry, material);
  scene.add(mesh);

  window.addEventListener('resize', () => {
    renderer.setSize(window.innerWidth, window.innerHeight);
    material.uniforms.uResolution.value.set(window.innerWidth, window.innerHeight);
  });

  // 水滴の位置：左クリック&ドラッグで移動
  let dragging = false;
  window.addEventListener('pointerdown', e => {
    dragging = true;
  });
  window.addEventListener('pointerup', e => {
    dragging = false;
  });
  window.addEventListener('pointermove', e => {
    if (dragging) {
      mouse.x = e.clientX / window.innerWidth;
      mouse.y = 1.0 - (e.clientY / window.innerHeight);
    }
  });

  // 右クリック or 2本指タップで光源移動
  window.addEventListener('contextmenu', e => e.preventDefault());
  window.addEventListener('pointerdown', e => {
    if (e.button === 2) {
      // 右クリックで光源移動モード
      window.addEventListener('pointermove', moveLight);
    }
  });
  window.addEventListener('pointerup', e => {
    if (e.button === 2) {
      window.removeEventListener('pointermove', moveLight);
    }
  });
  function moveLight(e) {
    light.x = e.clientX / window.innerWidth;
    light.y = 1.0 - (e.clientY / window.innerHeight);
  }

  renderer.setAnimationLoop(() => {
    material.uniforms.uDrop.value.set(mouse.x, mouse.y);
    material.uniforms.uLight.value.set(light.x, light.y);
    renderer.render(scene, camera);
  });
});
</script>
</body>
</html>
